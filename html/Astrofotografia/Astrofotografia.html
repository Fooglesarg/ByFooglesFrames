<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astrofotografía | ByFooglesFrames</title>
    <link rel="stylesheet" href="../../css/astrofotografia.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="category-astro">

    <header class="navbar">
        <nav>
            <ul class="nav-links">
                <li><a href="../../index.html">Inicio</a></li>
                <li><a href="../../index.html#galeria">Categorías</a></li>
            </ul>
        </nav>
    </header>

    <main class="photo-stream-container">
        <header class="album-header-especifico">
            <h1>ASTROFOTO.</h1>
            <p>Explorando el cosmos a través de largas exposiciones</p>
        </header>

        <div class="photo-group">
            <h2 class="group-title">Paisajes Estelares</h2>
            <div class="stream-grid-mixed">
                <div class="stream-item horizontal">
                    <img src="../../images/Astrofotografia/1 (1).jpg" alt="Astro Horizontal 1" loading="lazy">
                </div>
            </div>
        </div>

        <div class="photo-group">
            <h2 class="group-title">El paisaje estelar en vertical</h2>
            <div class="stream-grid-mixed">
                <div class="stream-item vertical">
                    <img src="../../images/Astrofotografia/2 (1).jpg" alt="Astro Vertical 1" loading="lazy">
                </div>
            </div>
        </div>
        <p>Página actualmente en progreso</p>
    </main>

    <footer class="navigation-footer">
        <a href="../../index.html" class="btn-back">Volver al Inicio</a>
    </footer>

    <script src="../../index.js"></script>
</body>
</html>
