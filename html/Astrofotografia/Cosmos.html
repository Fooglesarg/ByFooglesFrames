<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmos - Astrofotografía | ByFooglesFrames</title>
    <link rel="stylesheet" href="../../css/astrofotografia.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="category-astro">

    <header class="navbar">
        <nav>
            <ul class="nav-links">
                <li><a href="../../index.html">Inicio</a></li>
                <li><a href="Astrofotografia.html">Volver a Astrofotografía</a></li>
                <li><a href="Cosmos.html" class="active">Cosmos</a></li>
            </ul>
        </nav>
    </header>

    <main class="photo-stream-container">
        <header class="album-header-especifico">
            <h1>COSMOS</h1>
            <p>Nebulosas, estrellas y el polvo estelar de nuestra galaxia</p>
        </header>

        <div class="photo-group">
            <h2 class="group-title">Paisajes Galácticos</h2>
            <div class="stream-grid-mixed">
                <div class="stream-item horizontal">
                    <img src="../../images/Astrofotografia/Cosmos/1 (1).jpg" alt="Cosmos H1" loading="lazy">
                </div>
                <div class="stream-item horizontal">
                    <img src="../../images/Astrofotografia/Cosmos/1 (2).jpg" alt="Cosmos H2" loading="lazy">
                </div>
                <div class="stream-item horizontal">
                    <img src="../../images/Astrofotografia/Cosmos/1 (3).jpg" alt="Cosmos H3" loading="lazy">
                </div>
            </div>
        </div>

        <div class="photo-group">
            <h2 class="group-title">Profundidad Estelar</h2>
            <div class="stream-grid-mixed">
                <div class="stream-item vertical">
                    <img src="../../images/Astrofotografia/Cosmos/2 (1).jpg" alt="Cosmos V1" loading="lazy">
                </div>
                <div class="stream-item vertical">
                    <img src="../../images/Astrofotografia/Cosmos/2 (2).jpg" alt="Cosmos V2" loading="lazy">
                </div>
                <div class="stream-item vertical">
                    <img src="../../images/Astrofotografia/Cosmos/2 (3).jpg" alt="Cosmos V3" loading="lazy">
                </div>
                <div class="stream-item vertical">
                    <img src="../../images/Astrofotografia/Cosmos/2 (4).jpg" alt="Cosmos V4" loading="lazy">
                </div>
            </div>
        </div>
    </main>

    <footer class="navigation-footer">
        <a href="Astrofotografia.html" class="btn-back">Volver a Astrofotografía</a>
    </footer>

    <script src="../../index.js"></script>
</body>
</html>
