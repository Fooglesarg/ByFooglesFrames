            </ul>
        </nav>
    </header>

    <main class="urbano-main-content">
        <section class="category-header-urbano">
            <h1>Bariloche</h1>
            <p class="category-tagline">Arquitectura alpina, madera y el espíritu de la Patagonia, sin lugar a dudas,

            <div class="photo-group">
                <h2 class="group-title">Detalles de Ciudad</h2>
                <div class="stream-grid-mixed">
