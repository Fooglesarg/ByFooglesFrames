<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street Photography | ByFooglesFrames</title>
    <link rel="stylesheet" href="../../css/street.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="category-street">

    <header class="navbar">
        <nav>
            <ul class="nav-links">
                <li><a href="../../index.html">Inicio</a></li>
                <li><a href="../../index.html#galeria">Categorías</a></li>
            </ul>
        </nav>
    </header>

    <main class="photo-stream-container">
        <header class="album-header-especifico">
            <h1>STREET</h1>
            <p>Capturando la esencia del asfalto y la vida urbana</p>
        </header>

        <div class="photo-group">
            <h2 class="group-title">Tomas Horizontales (Serie 1)</h2>
            <div class="stream-grid-mixed">
                <div class="stream-item horizontal"><img src="../../images/Street/1 (1).jpg" alt="Street H1" loading="lazy"></div>
                <div class="stream-item horizontal"><img src="../../images/Street/1 (2).jpg" alt="Street H2" loading="lazy"></div>
                <div class="stream-item horizontal"><img src="../../images/Street/1 (3).jpg" alt="Street H3" loading="lazy"></div>
                <div class="stream-item horizontal"><img src="../../images/Street/1 (4).jpg" alt="Street H4" loading="lazy"></div>
            </div>
        </div>

        <div class="photo-group">
            <h2 class="group-title">Tomas Verticales (Serie 2)</h2>
            <div class="stream-grid-mixed">
                <div class="stream-item vertical"><img src="../../images/Street/2 (1).jpg" alt="Street V1" loading="lazy"></div>
                <div class="stream-item vertical"><img src="../../images/Street/2 (2).jpg" alt="Street V2" loading="lazy"></div>
                <div class="stream-item vertical"><img src="../../images/Street/2 (3).jpg" alt="Street V3" loading="lazy"></div>
                <div class="stream-item vertical"><img src="../../images/Street/2 (4).jpg" alt="Street V4" loading="lazy"></div>
                <div class="stream-item vertical"><img src="../../images/Street/2 (5).jpg" alt="Street V5" loading="lazy"></div>
                <div class="stream-item vertical"><img src="../../images/Street/2 (6).jpg" alt="Street V6" loading="lazy"></div>
            </div>
        </div>
        <p>Página actualmente en progreso</p>
    </main>

    <footer class="navigation-footer">
        <a href="../../index.html" class="btn-back">Volver al Inicio</a>
    </footer>

</body>
</html>
